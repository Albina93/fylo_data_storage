<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Fylo data storage component</title>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <picture class="position-absolute bottom-0 start-0 z-n1">
      <source media="(max-width:575.98px)" srcset="./images/bg-mobile.png" />
      <img
        src="./images/bg-desktop.png"
        class="img-fluid"
        alt="Image of background"
      />
    </picture>
    <div class="container">
      <div class="row justify-content-md-center g-4">
        <div class="col-12 col-lg-3">
          <div
            class="p-3 rounded-2 rounded-end-circle rounded-bottom-2"
            style="background-color: hsl(228, 56%, 26%)"
          >
            <img
              class="my-3"
              src="./images/logo.svg"
              alt=""
              style="width: 120px"
            />
            <div class="d-flex justify-content-start gap-3 py-3">
              <div class="img_cont p-2 rounded-2">
                <img src="./images/icon-document.svg" alt="" />
              </div>
              <div class="img_cont p-2 rounded-2">
                <img src="./images/icon-folder.svg" alt="" />
              </div>
              <div class="img_cont p-2 rounded-2">
                <img src="./images/icon-upload.svg" alt="" />
              </div>
            </div>
          </div>
        </div>
        <div class="col-12 col-lg-5">
          <div
            class="p-3 rounded position-relative mt-3"
            style="background-color: hsl(228, 56%, 26%); min-height: 150px"
          >
            <p class="text-center text-lg-start p-2">
              You’ve used <strong>815 GB</strong> of your storage
            </p>
            <div
              class="progress rounded-4 position-relative mt-3"
              style="height: 20px"
            >
              <div
                class="progress-bar rounded-4"
                role="progressbar"
                style="width: 75%"
                aria-valuenow="75"
                aria-valuemin="0"
                aria-valuemax="100"
              >
                <div
                  class="rounded-circle bg-white"
                  style="
                    position: absolute;
                    left: 72%;
                    width: 11px;
                    height: 11px;
                  "
                ></div>
              </div>
            </div>
            <div
              class="badge bg-white text-dark pt-2 position-absolute d-none d-md-block"
              style="height: 30px; top: -15px; right: 25px"
            >
              <strong>185</strong> GB LEFT
            </div>
            <div
              class="badge bg-white text-dark pt-2 position-absolute d-block d-md-none"
              style="
                height: 30px;
                bottom: -15px;
                left: 50%;
                transform: translateX(-50%);
              "
            >
              <strong>185</strong> GB LEFT
            </div>
            <div class="d-flex justify-content-between mt-2 mb-4">
              <span>0 GB</span>
              <span>1000 GB</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
